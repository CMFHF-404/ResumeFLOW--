<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>原子简历</title>
    <!-- Umami Analytics -->
    <script defer src="%VITE_UMAMI_HOST%/script.js" data-website-id="%VITE_UMAMI_WEBSITE_ID%" data-auto-track="false"></script>
    <link rel="icon" type="image/png" href="/favicon.png">
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography,container-queries"></script>
    <style>
        @font-face {
            font-family: 'Inter';
            src: url('/fonts/Arial.ttf') format('truetype');
            font-style: normal;
            font-weight: 400;
            font-display: swap;
        }

        @font-face {
            font-family: 'Inter';
            src: url('/fonts/Arial-Bold.ttf') format('truetype');
            font-style: normal;
            font-weight: 700;
            font-display: swap;
        }

        @font-face {
            font-family: 'Noto Sans SC';
            src: url('/fonts/NotoSansSC-VF.ttf') format('truetype');
            font-style: normal;
            font-weight: 300 700;
            font-display: swap;
        }

        body {
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            font-synthesis: none;
        }

        /* Custom scrollbar for webkit */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #D1D5DB;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #9CA3AF;
        }

        .dark ::-webkit-scrollbar-thumb {
            background: #4B5563;
        }

        .dark ::-webkit-scrollbar-thumb:hover {
            background: #6B7280;
        }

        .a4-preview {
            box-sizing: border-box;
            width: 210mm;
            height: 297mm;
            min-height: 297mm;
            background: white;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            margin: 0 auto;
            position: relative;
        }

        .fluid-input {
            width: 100%;
            border: none;
            border-bottom: 1px solid #E5E7EB;
            background: transparent;
            padding: 0.5rem 0;
            outline: none;
            transition: all 0.2s;
        }

        .fluid-input:focus {
            border-bottom-color: #0F766E;
            box-shadow: none;
        }

        .dark .fluid-input {
            border-bottom-color: #374151;
            color: #F3F4F6;
        }

        .dark .fluid-input:focus {
            border-bottom-color: #2DD4BF;
        }

        @page {
            size: A4;
            margin: 0;
        }

        @media print {
            html,
            body {
                background: white !important;
                height: auto !important;
                overflow: visible !important;
            }

            .a4-preview {
                box-shadow: none !important;
                margin: 0 auto !important;
            }

            .a4-preview[data-rf-preview-scope="print"] {
                height: auto !important;
                min-height: 297mm !important;
            }

            .rf-print-preview,
            .rf-print-preview-shell,
            .rf-print-preview main,
            .rf-print-preview-shell main {
                background: white !important;
                overflow: visible !important;
            }

            .rf-print-preview-shell,
            .rf-print-preview main,
            .rf-print-preview-shell main {
                padding: 0 !important;
            }

            .rf-print-preview main,
            .rf-print-preview-shell main {
                display: block !important;
                min-height: auto !important;
            }

            .rf-print-preview main>div,
            .rf-print-preview main>div>div,
            .rf-print-preview-shell main>div,
            .rf-print-preview-shell main>div>div {
                display: block !important;
                width: auto !important;
                min-height: auto !important;
                overflow: visible !important;
            }

            .rf-break-avoid {
                break-inside: avoid;
                page-break-inside: avoid;
            }

            .rf-print-preview-shell #basic-info,
            .rf-print-preview-shell [data-rf-section-id],
            .rf-print-preview-shell [data-rf-item-id] {
                break-inside: avoid;
                page-break-inside: avoid;
            }
        }

        .nav-tooltip {
            position: absolute;
            left: 100%;
            top: 50%;
            transform: translateY(-50%);
            margin-left: 0.75rem;
            padding: 0.25rem 0.5rem;
            background-color: #111827;
            color: white;
            font-size: 0.75rem;
            border-radius: 0.25rem;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s;
            white-space: nowrap;
            z-index: 50;
            pointer-events: none;
        }

        .group:hover .nav-tooltip {
            opacity: 1;
            visibility: visible;
        }

        .nav-tooltip::before {
            content: '';
            position: absolute;
            top: 50%;
            right: 100%;
            transform: translateY(-50%);
            margin-right: -1px;
            border-width: 4px;
            border-style: solid;
            border-color: transparent #111827 transparent transparent;
        }

        /* Toast 动画 */
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .animate-slideIn {
            animation: slideIn 0.3s ease-out;
        }

        @keyframes dashboardPreviewFadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .dashboard-preview-fade-in {
            animation: dashboardPreviewFadeIn 220ms ease-out both;
            will-change: opacity;
        }

        .dashboard-resume-card {
            content-visibility: auto;
            contain-intrinsic-size: 360px 520px;
        }

        @media (prefers-reduced-motion: reduce) {
            .dashboard-preview-fade-in {
                animation: none;
            }
        }

        /* 卡片编辑态展开/收缩：上下边缘同时运动 */
        .card-edge-motion {
            transform-origin: center;
            will-change: clip-path, transform, opacity;
            backface-visibility: hidden;
        }

        @keyframes cardEdgeExpand {
            from {
                clip-path: inset(14% 0 14% 0);
                transform: translateY(8px);
                opacity: 0.65;
            }

            to {
                clip-path: inset(0 0 0 0);
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes cardEdgeCollapse {
            from {
                clip-path: inset(0 0 0 0);
                transform: translateY(0);
                opacity: 1;
            }

            to {
                clip-path: inset(14% 0 14% 0);
                transform: translateY(-8px);
                opacity: 0.3;
            }
        }

        .card-edge-expand {
            animation: cardEdgeExpand 300ms cubic-bezier(0.22, 0.61, 0.36, 1);
        }

        .card-edge-collapse {
            animation: cardEdgeCollapse 300ms cubic-bezier(0.55, 0.06, 0.68, 0.19);
        }

        @media (prefers-reduced-motion: reduce) {

            .card-edge-expand,
            .card-edge-collapse {
                animation: none;
            }
        }

        /* 卡片折叠后高亮闪动：替代滚动定位 */
        @keyframes cardHighlight {
            0%   { box-shadow: 0 0 0 0 rgba(15, 118, 110, 0); }
            20%  { box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.45); background-color: rgba(15, 118, 110, 0.06); }
            50%  { box-shadow: 0 0 0 2px rgba(15, 118, 110, 0.25); background-color: rgba(15, 118, 110, 0.03); }
            70%  { box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.35); background-color: rgba(15, 118, 110, 0.05); }
            100% { box-shadow: 0 0 0 0 rgba(15, 118, 110, 0); background-color: transparent; }
        }

        .card-highlight {
            animation: cardHighlight 900ms ease-out;
        }

        @keyframes aiPolishCardExpand {
            from {
                max-height: 0;
                opacity: 0;
                transform: translateY(-6px);
            }

            to {
                max-height: 32rem;
                opacity: 1;
                transform: translateY(0);
            }
        }

        .ai-polish-card-expand {
            animation: aiPolishCardExpand 220ms ease-out;
            transform-origin: top;
        }

        @keyframes jdAnalysisStatusEnter {
            from {
                clip-path: inset(0 0 0 72%);
                opacity: 0.7;
                transform: translateX(10px) scaleY(0.96);
            }

            to {
                clip-path: inset(0 0 0 0);
                opacity: 1;
                transform: translateX(0) scaleY(1);
            }
        }

        @keyframes jdAnalysisStatusExit {
            from {
                clip-path: inset(0 0 0 0);
                opacity: 1;
                transform: translateX(0) scaleY(1);
            }

            to {
                clip-path: inset(0 0 0 72%);
                opacity: 0.55;
                transform: translateX(10px) scaleY(0.96);
            }
        }

        @keyframes jdAnalysisControlsReturn {
            from {
                clip-path: inset(0 72% 0 0);
                opacity: 0.65;
                transform: translateX(-10px) scaleY(0.96);
            }

            to {
                clip-path: inset(0 0 0 0);
                opacity: 1;
                transform: translateX(0) scaleY(1);
            }
        }

        .jd-analysis-status-motion,
        .jd-analysis-controls-return {
            backface-visibility: hidden;
            transform-origin: bottom right;
            will-change: clip-path, opacity, transform;
        }

        .jd-analysis-status-enter {
            animation: jdAnalysisStatusEnter 220ms cubic-bezier(0.22, 1, 0.36, 1);
        }

        .jd-analysis-status-exit {
            animation: jdAnalysisStatusExit 180ms cubic-bezier(0.55, 0.06, 0.68, 0.19) forwards;
        }

        .jd-analysis-controls-return {
            animation: jdAnalysisControlsReturn 180ms cubic-bezier(0.22, 1, 0.36, 1);
        }

        @keyframes simpleParsingGlow {
            0% {
                box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.14), 0 0 22px rgba(168, 85, 247, 0.26);
            }

            50% {
                box-shadow: 0 0 0 5px rgba(59, 130, 246, 0.16), 0 0 36px rgba(14, 165, 233, 0.38);
            }

            100% {
                box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.14), 0 0 22px rgba(168, 85, 247, 0.26);
            }
        }

        @keyframes simpleParsingShimmer {
            from {
                background-position: 0% 50%;
            }

            to {
                background-position: 200% 50%;
            }
        }

        .simple-parsing-flow {
            background-image: linear-gradient(110deg, rgba(250, 245, 255, 0.92) 0%, rgba(224, 242, 254, 0.88) 42%, rgba(245, 243, 255, 0.92) 70%, rgba(250, 245, 255, 0.92) 100%);
            background-size: 200% 100%;
            animation: simpleParsingGlow 1.6s ease-in-out infinite, simpleParsingShimmer 2.8s linear infinite;
        }

        .dark .simple-parsing-flow {
            background-image: linear-gradient(110deg, rgba(88, 28, 135, 0.2) 0%, rgba(12, 74, 110, 0.22) 42%, rgba(76, 29, 149, 0.18) 70%, rgba(88, 28, 135, 0.2) 100%);
        }

        .star-action-bullet-cue {
            padding-left: 1.75rem !important;
        }

        .star-action-bullet-cue ul,
        .star-action-bullet-cue ol {
            margin-left: 0.2rem;
        }

        .star-action-bullet-cue li::marker {
            color: #9CA3AF;
        }

        .rich-text-line-bullet-cues {
            bottom: 0;
            left: 0;
            pointer-events: none;
            position: absolute;
            right: 0;
            top: 0;
            z-index: 1;
        }

        .rich-text-line-bullet-cue-dot {
            color: #9CA3AF;
            font-size: 0.875rem;
            left: 0.875rem;
            line-height: 1.625;
            position: absolute;
            transform: translateY(-0.08rem);
        }

        @keyframes starPanelExpand {
            from {
                clip-path: inset(33% 0 33% 0);
                opacity: 0.62;
                transform: translateY(-8px) scaleY(0.96);
            }

            to {
                clip-path: inset(0 0 0 0);
                opacity: 1;
                transform: translateY(0) scaleY(1);
            }
        }

        @keyframes simplePanelFoldIn {
            from {
                clip-path: inset(12% 0 12% 0);
                opacity: 0.66;
                transform: translateY(8px) scaleY(0.98);
            }

            to {
                clip-path: inset(0 0 0 0);
                opacity: 1;
                transform: translateY(0) scaleY(1);
            }
        }

        .star-mode-panel {
            animation: starPanelExpand 260ms cubic-bezier(0.22, 0.61, 0.36, 1);
            transform-origin: center;
        }

        .simple-mode-panel {
            animation: simplePanelFoldIn 220ms cubic-bezier(0.22, 0.61, 0.36, 1);
            transform-origin: center;
        }

        @media (prefers-reduced-motion: reduce) {
            .card-highlight,
            .ai-polish-card-expand,
            .jd-analysis-status-enter,
            .jd-analysis-status-exit,
            .jd-analysis-controls-return,
            .simple-parsing-flow,
            .star-mode-panel,
            .simple-mode-panel {
                animation: none;
            }

            .jd-analysis-status-motion,
            .jd-analysis-controls-return {
                clip-path: none;
                transform: none;
            }
        }
        /* AI 按钮渐变绿背景（无流光动画） */
        .ai-active-gradient {
            background: linear-gradient(135deg, #10B981 0%, #059669 40%, #0D9488 100%) !important;
            border: none !important;
        }

        .dark .ai-active-gradient {
            background: linear-gradient(135deg, #059669 0%, #0D9488 50%, #134E4A 100%) !important;
        }
    </style>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#0F766E",
                        "primary-dark": "#115E59",
                        "background-light": "#F9FAFB",
                        "background-dark": "#111827",
                        "surface-light": "#FFFFFF",
                        "surface-dark": "#1F2937",
                        "border-light": "#E5E7EB",
                        "border-dark": "#374151",
                    },
                    fontFamily: {
                        display: ["Noto Sans SC", "Inter", "sans-serif"],
                        body: ["Noto Sans SC", "Inter", "sans-serif"],
                    },
                },
            },
        };
    </script>
    <script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.38.0",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0"
  }
}
</script>
  </head>

<body class="bg-background-light dark:bg-background-dark text-gray-900 dark:text-gray-100 h-screen">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>

</html>
