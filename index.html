<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>原子简历</title>
    <!-- Umami Analytics -->
    <script defer src="https://rfumami.zeabur.app/script.js" data-website-id="248594f3-739f-4c38-b977-d95c5f5883a6" data-auto-track="false"></script>
    <link rel="icon" type="image/png" href="/favicon.png">
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
        }

        /* Custom scrollbar for webkit */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #D1D5DB;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #9CA3AF;
        }

        .dark ::-webkit-scrollbar-thumb {
            background: #4B5563;
        }

        .dark ::-webkit-scrollbar-thumb:hover {
            background: #6B7280;
        }

        .a4-preview {
            width: 210mm;
            min-height: 297mm;
            background: white;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            margin: 0 auto;
            position: relative;
        }

        #rf-print-root {
            position: fixed;
            left: -10000px;
            top: 0;
            width: 210mm;
            max-height: 0;
            opacity: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: -1;
        }

        .rf-print-surface {
            background: white;
            visibility: visible;
        }

        .fluid-input {
            width: 100%;
            border: none;
            border-bottom: 1px solid #E5E7EB;
            background: transparent;
            padding: 0.5rem 0;
            outline: none;
            transition: all 0.2s;
        }

        .fluid-input:focus {
            border-bottom-color: #0F766E;
            box-shadow: none;
        }

        .dark .fluid-input {
            border-bottom-color: #374151;
            color: #F3F4F6;
        }

        .dark .fluid-input:focus {
            border-bottom-color: #2DD4BF;
        }

        @page {
            size: A4;
            margin: 0;
        }

        @media print {
            body {
                background: white !important;
            }

            #root {
                display: none !important;
            }

            #rf-print-root {
                position: static !important;
                left: auto !important;
                top: auto !important;
                width: auto !important;
                visibility: visible !important;
                max-height: none !important;
                opacity: 1 !important;
                pointer-events: auto !important;
                overflow: visible !important;
                z-index: auto !important;
            }

            .a4-preview {
                box-shadow: none !important;
                margin: 0 auto !important;
            }

            .rf-print-preview,
            .rf-print-preview-shell,
            .rf-print-preview main,
            .rf-print-preview-shell main {
                background: white !important;
                overflow: visible !important;
            }

            .rf-print-preview-shell,
            .rf-print-preview main,
            .rf-print-preview-shell main {
                padding: 0 !important;
            }

            .rf-print-preview main,
            .rf-print-preview-shell main {
                display: block !important;
                min-height: auto !important;
            }

            .rf-print-preview main>div,
            .rf-print-preview main>div>div,
            .rf-print-preview-shell main>div,
            .rf-print-preview-shell main>div>div {
                display: block !important;
                width: auto !important;
                min-height: auto !important;
                overflow: visible !important;
            }

            .rf-break-avoid {
                break-inside: avoid;
                page-break-inside: avoid;
            }
        }

        .nav-tooltip {
            position: absolute;
            left: 100%;
            top: 50%;
            transform: translateY(-50%);
            margin-left: 0.75rem;
            padding: 0.25rem 0.5rem;
            background-color: #111827;
            color: white;
            font-size: 0.75rem;
            border-radius: 0.25rem;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s;
            white-space: nowrap;
            z-index: 50;
            pointer-events: none;
        }

        .group:hover .nav-tooltip {
            opacity: 1;
            visibility: visible;
        }

        .nav-tooltip::before {
            content: '';
            position: absolute;
            top: 50%;
            right: 100%;
            transform: translateY(-50%);
            margin-right: -1px;
            border-width: 4px;
            border-style: solid;
            border-color: transparent #111827 transparent transparent;
        }

        /* Toast 动画 */
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .animate-slideIn {
            animation: slideIn 0.3s ease-out;
        }

        /* 卡片编辑态展开/收缩：上下边缘同时运动 */
        .card-edge-motion {
            transform-origin: center;
            will-change: clip-path, transform, opacity;
            backface-visibility: hidden;
        }

        @keyframes cardEdgeExpand {
            from {
                clip-path: inset(14% 0 14% 0);
                transform: translateY(8px);
                opacity: 0.65;
            }

            to {
                clip-path: inset(0 0 0 0);
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes cardEdgeCollapse {
            from {
                clip-path: inset(0 0 0 0);
                transform: translateY(0);
                opacity: 1;
            }

            to {
                clip-path: inset(14% 0 14% 0);
                transform: translateY(-8px);
                opacity: 0.3;
            }
        }

        .card-edge-expand {
            animation: cardEdgeExpand 300ms cubic-bezier(0.22, 0.61, 0.36, 1);
        }

        .card-edge-collapse {
            animation: cardEdgeCollapse 300ms cubic-bezier(0.55, 0.06, 0.68, 0.19);
        }

        @media (prefers-reduced-motion: reduce) {

            .card-edge-expand,
            .card-edge-collapse {
                animation: none;
            }
        }
    </style>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#0F766E",
                        "primary-dark": "#115E59",
                        "background-light": "#F9FAFB",
                        "background-dark": "#111827",
                        "surface-light": "#FFFFFF",
                        "surface-dark": "#1F2937",
                        "border-light": "#E5E7EB",
                        "border-dark": "#374151",
                    },
                    fontFamily: {
                        display: ["Noto Sans SC", "Inter", "sans-serif"],
                        body: ["Noto Sans SC", "Inter", "sans-serif"],
                    },
                },
            },
        };
    </script>
    <script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.38.0",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0"
  }
}
</script>
  </head>

<body class="bg-background-light dark:bg-background-dark text-gray-900 dark:text-gray-100 h-screen">
    <div id="root"></div>
    <div id="rf-print-root" aria-hidden="true"></div>
    <script type="module" src="/index.tsx"></script>
</body>

</html>
